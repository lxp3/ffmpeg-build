name: Build FFmpeg

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parse-tag:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      build_linux: ${{ steps.parse.outputs.build_linux }}
      linux_arch: ${{ steps.parse.outputs.linux_arch }}
      build_macos: ${{ steps.parse.outputs.build_macos }}
      macos_arch: ${{ steps.parse.outputs.macos_arch }}
      build_wasm: ${{ steps.parse.outputs.build_wasm }}
      build_windows_msvc_static: ${{ steps.parse.outputs.build_windows_msvc_static }}
      build_windows_mingw_static: ${{ steps.parse.outputs.build_windows_mingw_static }}
      build_windows_mingw_shared: ${{ steps.parse.outputs.build_windows_mingw_shared }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT

          # Default: all disabled
          BUILD_LINUX=false
          LINUX_ARCH=all
          BUILD_MACOS=false
          MACOS_ARCH=all
          BUILD_WASM=false
          BUILD_WINDOWS_MSVC_STATIC=false
          BUILD_WINDOWS_MINGW_STATIC=false
          BUILD_WINDOWS_MINGW_SHARED=false

          # Parse tag for specific builds
          if [[ "$TAG" == *-macos-x86_64 ]]; then
            BUILD_MACOS=true
            MACOS_ARCH=x86_64
          elif [[ "$TAG" == *-macos-aarch64 ]]; then
            BUILD_MACOS=true
            MACOS_ARCH=aarch64
          elif [[ "$TAG" == *-macos ]]; then
            BUILD_MACOS=true
          elif [[ "$TAG" == *-window-msvc-0 ]]; then
            BUILD_WINDOWS_MSVC_STATIC=true
          elif [[ "$TAG" == *-window-mingw-0 ]]; then
            BUILD_WINDOWS_MINGW_STATIC=true
          elif [[ "$TAG" == *-window-mingw-1 ]]; then
            BUILD_WINDOWS_MINGW_SHARED=true
          elif [[ "$TAG" == *-window ]]; then
            BUILD_WINDOWS_MSVC_STATIC=true
            BUILD_WINDOWS_MINGW_STATIC=true
            BUILD_WINDOWS_MINGW_SHARED=true
          elif [[ "$TAG" == *-aarch64 ]]; then
            BUILD_LINUX=true
            LINUX_ARCH=aarch64
          elif [[ "$TAG" == *-linux ]]; then
            BUILD_LINUX=true
            BUILD_WASM=true
          elif [[ "$TAG" == *-wasm ]]; then
            BUILD_WASM=true
          else
            BUILD_LINUX=true
            BUILD_WASM=true
            BUILD_MACOS=true
            BUILD_WINDOWS_MSVC_STATIC=true
            BUILD_WINDOWS_MINGW_STATIC=true
            BUILD_WINDOWS_MINGW_SHARED=true
          fi

          echo "build_linux=$BUILD_LINUX" >> $GITHUB_OUTPUT
          echo "linux_arch=$LINUX_ARCH" >> $GITHUB_OUTPUT
          echo "build_macos=$BUILD_MACOS" >> $GITHUB_OUTPUT
          echo "macos_arch=$MACOS_ARCH" >> $GITHUB_OUTPUT
          echo "build_wasm=$BUILD_WASM" >> $GITHUB_OUTPUT
          echo "build_windows_msvc_static=$BUILD_WINDOWS_MSVC_STATIC" >> $GITHUB_OUTPUT
          echo "build_windows_mingw_static=$BUILD_WINDOWS_MINGW_STATIC" >> $GITHUB_OUTPUT
          echo "build_windows_mingw_shared=$BUILD_WINDOWS_MINGW_SHARED" >> $GITHUB_OUTPUT

      - name: Cancel workflow on failure
        if: ${{ failure() && github.run_attempt == 1 }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            })

  build-linux:
    needs: parse-tag
    if: needs.parse-tag.outputs.build_linux == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            docker_platform: linux/amd64
            container_image: quay.io/pypa/manylinux2014_x86_64
            enable_shared: 0
            lib_type: static
          - arch: x86_64
            docker_platform: linux/amd64
            container_image: quay.io/pypa/manylinux2014_x86_64
            enable_shared: 1
            lib_type: shared
          - arch: aarch64
            docker_platform: linux/arm64
            container_image: quay.io/pypa/manylinux2014_aarch64
            enable_shared: 0
            lib_type: static
          - arch: aarch64
            docker_platform: linux/arm64
            container_image: quay.io/pypa/manylinux2014_aarch64
            enable_shared: 1
            lib_type: shared
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build Linux
        if: needs.parse-tag.outputs.linux_arch == 'all' || needs.parse-tag.outputs.linux_arch == matrix.arch
        run: |
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ matrix.container_image }} \
            bash -lc '
              set -euo pipefail
              yum install -y gcc gcc-c++ make autoconf automake libtool pkgconfig git perl-core tar xz nasm patch

              if [ "${{ matrix.enable_shared }}" = "1" ] && ! command -v patchelf >/dev/null; then
                if ! yum install -y patchelf; then
                  curl -fsSL https://github.com/NixOS/patchelf/archive/refs/tags/0.18.0.tar.gz -o /tmp/patchelf.tar.gz
                  tar -xzf /tmp/patchelf.tar.gz -C /tmp
                  cd /tmp/patchelf-0.18.0
                  ./bootstrap.sh
                  ./configure
                  make -j"$(nproc)"
                  make install
                  cd /workspace
                fi
              fi

              DEPS_PREFIX=/opt/ffmpeg-deps
              mkdir -p "$DEPS_PREFIX"
              export PKG_CONFIG_PATH="$DEPS_PREFIX/lib/pkgconfig:$DEPS_PREFIX/lib64/pkgconfig"
              export CPPFLAGS="-I$DEPS_PREFIX/include"
              export LDFLAGS="-L$DEPS_PREFIX/lib -L$DEPS_PREFIX/lib64"
              export PATH="$DEPS_PREFIX/bin:$PATH"

              build_autotools_dep() {
                local name="$1"
                local version="$2"
                local url="$3"
                local dir="$4"
                if pkg-config --exists "$name"; then
                  return 0
                fi
                curl -fsSL "$url" -o "/tmp/$name-$version.tar.gz"
                tar -xzf "/tmp/$name-$version.tar.gz" -C /tmp
                cd "/tmp/$dir"
                ./configure --prefix="$DEPS_PREFIX" --disable-dependency-tracking
                make -j"$(nproc)"
                make install
                cd /workspace
              }

              curl -fsSL https://www.openssl.org/source/openssl-3.0.14.tar.gz -o /tmp/openssl-3.0.14.tar.gz
              tar -xzf /tmp/openssl-3.0.14.tar.gz -C /tmp
              cd /tmp/openssl-3.0.14
              if [ "${{ matrix.enable_shared }}" = "1" ]; then
                OPENSSL_SHARED=shared
              else
                OPENSSL_SHARED=no-shared
              fi
              if [ "${{ matrix.arch }}" = "aarch64" ]; then
                OPENSSL_TARGET=linux-aarch64
              else
                OPENSSL_TARGET=linux-x86_64
              fi
              ./Configure "$OPENSSL_TARGET" "$OPENSSL_SHARED" --prefix="$DEPS_PREFIX" --libdir=lib
              make -j"$(nproc)"
              make install_sw
              cd /workspace

              build_autotools_dep ogg 1.3.5 https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz libogg-1.3.5
              build_autotools_dep vorbis 1.3.7 https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz libvorbis-1.3.7
              build_autotools_dep speex 1.2.1 https://downloads.xiph.org/releases/speex/speex-1.2.1.tar.gz speex-1.2.1
              build_autotools_dep opus 1.5.2 https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz opus-1.5.2
              build_autotools_dep lame 3.100 https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz lame-3.100

              chmod +x build.sh build-linux.sh build-common.sh
              ARCH=${{ matrix.arch }} ENABLE_SHARED=${{ matrix.enable_shared }} ENABLE_EXTERNAL_CODECS=1 TARGET_OS=linux ./build.sh
            '

      - name: Verify Linux Artifacts
        if: needs.parse-tag.outputs.linux_arch == 'all' || needs.parse-tag.outputs.linux_arch == matrix.arch
        run: |
          ls -lah outputs
          test -n "$(find outputs -maxdepth 1 -type f -name '*-${{ matrix.lib_type }}-${{ matrix.arch }}-linux-gnu.tar.gz' -print -quit)"

      - name: Upload Linux Artifacts
        if: needs.parse-tag.outputs.linux_arch == 'all' || needs.parse-tag.outputs.linux_arch == matrix.arch
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-${{ matrix.arch }}-${{ matrix.lib_type }}
          path: outputs/*-${{ matrix.lib_type }}-${{ matrix.arch }}-linux-gnu.tar.gz

      - name: Cancel workflow on failure
        if: ${{ failure() && github.run_attempt == 1 }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            })

  build-wasm:
    needs: parse-tag
    if: needs.parse-tag.outputs.build_wasm == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Build WASM
        run: |
          chmod +x build-wasm.sh
          ENABLE_EXTERNAL_CODECS=0 ./build-wasm.sh

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-wasm-artifacts
          path: outputs/*.tar.gz

      - name: Cancel workflow on failure
        if: ${{ failure() && github.run_attempt == 1 }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            })

  build-macos:
    needs: parse-tag
    if: needs.parse-tag.outputs.build_macos == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
            enable_shared: 0
            lib_type: static
          - arch: x86_64
            runner: macos-15-intel
            enable_shared: 1
            lib_type: shared
          - arch: aarch64
            runner: macos-15
            enable_shared: 0
            lib_type: static
          - arch: aarch64
            runner: macos-15
            enable_shared: 1
            lib_type: shared
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        if: needs.parse-tag.outputs.macos_arch == 'all' || needs.parse-tag.outputs.macos_arch == matrix.arch
        run: |
          brew update
          brew install autoconf automake libtool pkg-config nasm yasm make bison gnu-tar xz openssl@3 lame opus libogg libvorbis speex

      - name: Build macOS
        if: needs.parse-tag.outputs.macos_arch == 'all' || needs.parse-tag.outputs.macos_arch == matrix.arch
        run: |
          set -euo pipefail
          BREW_PREFIX="$(brew --prefix)"
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          export PKG_CONFIG_PATH="$OPENSSL_PREFIX/lib/pkgconfig:$BREW_PREFIX/lib/pkgconfig"
          export CPPFLAGS="-I$OPENSSL_PREFIX/include -I$BREW_PREFIX/include"
          export LDFLAGS="-L$OPENSSL_PREFIX/lib -L$BREW_PREFIX/lib"
          export PATH="$BREW_PREFIX/opt/make/libexec/gnubin:$PATH"
          export MACOSX_DEPLOYMENT_TARGET=12.0

          chmod +x build.sh build-macos.sh build-common.sh
          ARCH=${{ matrix.arch }} ENABLE_SHARED=${{ matrix.enable_shared }} ENABLE_EXTERNAL_CODECS=1 TARGET_OS=macos ./build.sh

      - name: Verify macOS Artifacts
        if: needs.parse-tag.outputs.macos_arch == 'all' || needs.parse-tag.outputs.macos_arch == matrix.arch
        run: |
          ls -lah outputs
          test -n "$(find outputs -maxdepth 1 -type f -name '*-${{ matrix.lib_type }}-${{ matrix.arch }}-macos.tar.gz' -print -quit)"

      - name: Upload macOS Artifacts
        if: needs.parse-tag.outputs.macos_arch == 'all' || needs.parse-tag.outputs.macos_arch == matrix.arch
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-${{ matrix.arch }}-${{ matrix.lib_type }}
          path: outputs/*-${{ matrix.lib_type }}-${{ matrix.arch }}-macos.tar.gz

      - name: Cancel workflow on failure
        if: ${{ failure() && github.run_attempt == 1 }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            })

  build-windows:
    needs: parse-tag
    runs-on: windows-latest
    if: |
      needs.parse-tag.outputs.build_windows_msvc_static == 'true' ||
      needs.parse-tag.outputs.build_windows_mingw_static == 'true' ||
      needs.parse-tag.outputs.build_windows_mingw_shared == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - output_key: build_windows_msvc_static
            toolchain: msvc
            enable_shared: 0
            artifact_name: ffmpeg-windows-msvc-static
          - output_key: build_windows_mingw_static
            toolchain: mingw
            enable_shared: 0
            artifact_name: ffmpeg-windows-mingw-static
          - output_key: build_windows_mingw_shared
            toolchain: mingw
            enable_shared: 1
            artifact_name: ffmpeg-windows-mingw-shared
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2 dependencies for MSVC
        if: matrix.toolchain == 'msvc' && needs.parse-tag.outputs.build_windows_msvc_static == 'true'
        shell: cmd
        run: |
          C:\msys64\usr\bin\pacman.exe -Sy --noconfirm mingw-w64-x86_64-nasm make diffutils mingw-w64-x86_64-lame mingw-w64-x86_64-opus mingw-w64-x86_64-libvorbis mingw-w64-x86_64-speex mingw-w64-x86_64-openssl

      - name: Setup MSYS2
        if: |
          matrix.toolchain == 'mingw' &&
          ((matrix.enable_shared == 0 && needs.parse-tag.outputs.build_windows_mingw_static == 'true') ||
          (matrix.enable_shared == 1 && needs.parse-tag.outputs.build_windows_mingw_shared == 'true'))
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-lame
            mingw-w64-x86_64-opus
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-speex
            mingw-w64-x86_64-openssl
            make
            diffutils
            tar

      - name: Build Windows with MSVC
        if: matrix.toolchain == 'msvc' && needs.parse-tag.outputs.build_windows_msvc_static == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:ENABLE_EXTERNAL_CODECS = "1"
          .\build-window.ps1 -Toolchain msvc -EnableShared ${{ matrix.enable_shared }}

      - name: Build Windows with MinGW
        if: |
          matrix.toolchain == 'mingw' &&
          ((matrix.enable_shared == 0 && needs.parse-tag.outputs.build_windows_mingw_static == 'true') ||
          (matrix.enable_shared == 1 && needs.parse-tag.outputs.build_windows_mingw_shared == 'true'))
        shell: msys2 {0}
        run: |
          set -e
          chmod +x build.sh build-window.sh build-common.sh
          export ENABLE_SHARED=${{ matrix.enable_shared }}
          export ENABLE_EXTERNAL_CODECS=1
          export TOOLCHAIN=mingw
          TARGET_OS=windows ./build.sh

      - name: Upload Artifacts
        if: |
          (matrix.toolchain == 'msvc' && needs.parse-tag.outputs.build_windows_msvc_static == 'true') ||
          (matrix.toolchain == 'mingw' && matrix.enable_shared == 0 && needs.parse-tag.outputs.build_windows_mingw_static == 'true') ||
          (matrix.toolchain == 'mingw' && matrix.enable_shared == 1 && needs.parse-tag.outputs.build_windows_mingw_shared == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: outputs/*.tar.gz

      - name: Cancel workflow on failure
        if: ${{ failure() && github.run_attempt == 1 }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            })

  release:
    needs: [parse-tag, build-linux, build-wasm, build-macos, build-windows]
    if: always() && (needs.build-linux.result == 'success' || needs.build-wasm.result == 'success' || needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts -type f -name "*.tar.gz"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
